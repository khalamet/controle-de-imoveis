<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Detalhes do Imóvel</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#f1f5f9;
      padding:40px;
    }

    .box{

      background:white;

      max-width:900px;

      margin:auto;

      padding:40px;

      border-radius:20px;

      box-shadow:
        0 10px 25px rgba(0,0,0,0.08);

    }

    h1{
      margin-bottom:35px;
      color:#0f172a;
      font-size:36px;
    }

    .campo{
      margin-bottom:25px;
    }

    .campo label{

      display:block;

      margin-bottom:8px;

      font-weight:bold;

      color:#334155;
    }

    .campo input,
    .campo textarea{

      width:100%;

      padding:14px;

      border-radius:12px;

      border:1px solid #cbd5e1;

      font-size:16px;
    }

    textarea{
      min-height:120px;
      resize:vertical;
    }

    .botoes{

      display:flex;

      gap:15px;

      margin-top:35px;
    }

    button{

      padding:14px 22px;

      border:none;

      border-radius:12px;

      color:white;

      font-size:16px;

      cursor:pointer;
    }

    .salvar{
      background:#16a34a;
    }

    .voltar{
      background:#0f172a;
    }

    .status{

      margin-top:25px;

      font-weight:bold;
    }

  </style>
</head>
<body>

<div class="box">

  <h1 id="titulo">
    Carregando...
  </h1>

  <div class="campo">

    <label>Nome do imóvel</label>

    <input
      type="text"
      id="nome">
  </div>

  <div class="campo">

    <label>Endereço</label>

    <textarea id="endereco"></textarea>
  </div>

  <div class="campo">

    <label>Matrícula RGI</label>

    <input
      type="text"
      id="rgi">
  </div>

  <div class="campo">

    <label>Matrícula IPTU</label>

    <input
      type="text"
      id="iptu">
  </div>

  <div class="botoes">

    <button
      class="salvar"
      onclick="salvar()">

      Salvar
    </button>

    <button
      class="voltar"
      onclick="voltar()">

      Voltar
    </button>

  </div>

  <div
    class="status"
    id="status">
  </div>

</div>

<script>

  if(localStorage.getItem("logado") !== "sim"){

    window.location.href = "index.html";
  }

  const SUPABASE_URL =
    "https://xkiswuhpgbifjshjmuvf.supabase.co";

  const SUPABASE_KEY =
    "SUA_ANON_KEY_AQUI";

  const supabaseClient =
    supabase.createClient(
      SUPABASE_URL,
      SUPABASE_KEY
    );

  const params =
    new URLSearchParams(window.location.search);

  const slug = params.get("id");

  let imovelId = null;

  async function carregarImovel(){

    const { data, error } =
      await supabaseClient
      .from("imoveis")
      .select("*")
      .eq("slug", slug)
      .single();

    if(error){

      document.getElementById("titulo")
      .innerText =
      "Erro ao carregar imóvel";

      return;
    }

    imovelId = data.id;

    document.getElementById("titulo")
    .innerText = data.nome;

    document.getElementById("nome")
    .value = data.nome;

    document.getElementById("endereco")
    .value = data.endereco;

    document.getElementById("rgi")
    .value = data.rgi;

    document.getElementById("iptu")
    .value = data.iptu;
  }

  async function salvar(){

    const { error } =
      await supabaseClient
      .from("imoveis")
      .update({

        nome:
        document.getElementById("nome").value,

        endereco:
        document.getElementById("endereco").value,

        rgi:
        document.getElementById("rgi").value,

        iptu:
        document.getElementById("iptu").value

      })
      .eq("id", imovelId);

    if(error){

      document.getElementById("status")
      .innerText =
      "Erro ao salvar.";

      return;
    }

    document.getElementById("status")
    .innerText =
    "Alterações salvas com sucesso.";
  }

  function voltar(){

    window.location.href =
      "painel.html";
  }

  carregarImovel();

</script>

</body>
</html>
