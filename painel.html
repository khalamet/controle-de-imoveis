<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel</title>

  <style>

    body{
      font-family:Arial, sans-serif;
      background:#f1f5f9;
      margin:0;
      padding:40px;
    }

    .box{
      background:white;
      padding:40px;
      border-radius:16px;
      max-width:700px;
      margin:auto;
      box-shadow:0 10px 30px rgba(0,0,0,0.1);
    }

    h1{
      color:#0f172a;
      margin-bottom:20px;
    }

    p{
      font-size:18px;
      color:#334155;
    }

    button{
      margin-top:30px;
      padding:12px 20px;
      border:none;
      border-radius:10px;
      background:#dc2626;
      color:white;
      cursor:pointer;
      font-size:16px;
    }

  </style>
</head>
<body>

  <div class="box">

    <h1>Login realizado com sucesso</h1>

    <p id="usuario"></p>

    <button onclick="logout()">Sair</button>

  </div>

  <script>

    const usuario = localStorage.getItem("usuarioLogado");

    if(!usuario){
      window.location.href = "index.html";
    }

    document.getElementById("usuario").innerText =
      "Usuário logado: " + usuario;

    function logout(){
      localStorage.removeItem("usuarioLogado");
      window.location.href = "index.html";
    }

  </script>

</body>
</html>
