<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Imóveis</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;

      background:
        linear-gradient(
          rgba(15,23,42,0.55),
          rgba(15,23,42,0.55)
        ),
        url("assets/logo.png");

      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;

      overflow:hidden;
    }

    .login-box{

      width:380px;
      padding:45px;

      background:rgba(255,255,255,0.16);

      border:1px solid rgba(255,255,255,0.22);

      border-radius:24px;

      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);

      box-shadow:
        0 8px 32px rgba(0,0,0,0.25);

    }

    h1{
      text-align:center;
      margin-bottom:35px;
      color:white;
      font-size:32px;
      font-weight:600;
      letter-spacing:0.5px;
    }

    .input-group{
      margin-bottom:18px;
    }

    input{

      width:100%;
      padding:16px 18px;

      border-radius:14px;

      border:1px solid rgba(255,255,255,0.18);

      background:rgba(255,255,255,0.12);

      color:white;

      font-size:16px;

      outline:none;

      transition:0.3s;

    }

    input::placeholder{
      color:rgba(255,255,255,0.72);
    }

    input:focus{

      border:1px solid rgba(255,255,255,0.4);

      background:rgba(255,255,255,0.18);

    }

    button{

      width:100%;
      padding:16px;

      margin-top:8px;

      border:none;
      border-radius:14px;

      background:white;

      color:#0f172a;

      font-size:16px;
      font-weight:600;

      cursor:pointer;

      transition:0.3s;

    }

    button:hover{

      transform:translateY(-2px);

      background:#f8fafc;
    }

    .erro{

      color:#fecaca;

      text-align:center;

      margin-top:18px;

      font-size:15px;
    }

  </style>
</head>
<body>

  <div class="login-box">

    <h1>Controle de Imóveis</h1>

    <div class="input-group">

      <input
        type="email"
        id="email"
        placeholder="Digite seu email"
      >

    </div>

    <div class="input-group">

      <input
        type="password"
        id="senha"
        placeholder="Digite sua senha"
      >

    </div>

    <button id="btnLogin">
      Entrar
    </button>

    <div class="erro" id="erro"></div>

  </div>

  <script>

    const SUPABASE_URL =
      "https://xkiswuhpgbifjshjmuvf.supabase.co";

    const SUPABASE_KEY =
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhraXN3dWhwZ2JpZmpzaGptdXZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5ODk4OTksImV4cCI6MjA5NDU2NTg5OX0.MfDgb2Ie-iuHtaSHOvI1w_lL8B5yqlSujJL-PMKhKGg";

    const supabaseClient =
      supabase.createClient(
        SUPABASE_URL,
        SUPABASE_KEY
      );

    document
      .getElementById("btnLogin")
      .addEventListener("click", fazerLogin);

    async function fazerLogin(){

      const email =
        document.getElementById("email").value.trim();

      const senha =
        document.getElementById("senha").value.trim();

      const { data, error } =
        await supabaseClient.auth.signInWithPassword({

          email: email,
          password: senha

        });

      if(error){

        document.getElementById("erro").innerText =
          "Email ou senha inválidos";

        return;
      }

      localStorage.setItem("logado", "sim");

      window.location.href = "painel.html";
    }

  </script>

</body>
</html>
