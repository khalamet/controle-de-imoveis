<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Imóveis</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#f1f5f9;
      padding:40px;
    }

    .topo{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:40px;
    }

    h1{
      color:#0f172a;
    }

    .logout{
      background:#dc2626;
      color:white;
      border:none;
      padding:12px 20px;
      border-radius:10px;
      cursor:pointer;
      font-size:16px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:25px;
    }

    .card{
      background:white;
      padding:30px;
      border-radius:16px;
      box-shadow:0 10px 25px rgba(0,0,0,0.08);
      transition:0.3s;
    }

    .card:hover{
      transform:translateY(-5px);
    }

    .card h2{
      margin-bottom:20px;
      color:#0f172a;
    }

    .btn{
      width:100%;
      padding:12px;
      border:none;
      border-radius:10px;
      background:#0f172a;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

  </style>
</head>
<body>

<div class="topo">

  <h1>Meus Imóveis</h1>

  <button class="logout" onclick="logout()">
    Sair
  </button>

</div>

<div class="grid">

  <div class="card">
    <h2>Botafogo</h2>

    <button class="btn"
      onclick="abrirImovel('botafogo')">

      Abrir

    </button>
  </div>

  <div class="card">
    <h2>Catumbi</h2>

    <button class="btn"
      onclick="abrirImovel('catumbi')">

      Abrir

    </button>
  </div>

  <div class="card">
    <h2>Tijuca</h2>

    <button class="btn"
      onclick="abrirImovel('tijuca')">

      Abrir

    </button>
  </div>

  <div class="card">
    <h2>Porto</h2>

    <button class="btn"
      onclick="abrirImovel('porto')">

      Abrir

    </button>
  </div>

  <div class="card">
    <h2>Manaus</h2>

    <button class="btn"
      onclick="abrirImovel('manaus')">

      Abrir

    </button>
  </div>

  <div class="card">
    <h2>Sítio</h2>

    <button class="btn"
      onclick="abrirImovel('sitio')">

      Abrir

    </button>
  </div>

</div>

<script>

  if(localStorage.getItem("logado") !== "sim"){
    window.location.href = "index.html";
  }

  function logout(){

    localStorage.removeItem("logado");

    window.location.href = "index.html";
  }

  function abrirImovel(nome){

    window.location.href =
      "imovel.html?id=" + nome;
  }

</script>

</body>
</html>
